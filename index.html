<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruta Envases">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<title>Ruta Envases</title>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap');

  :root {
    --azul: #1a1a1a;
    --azul-oscuro: #000000;
    --gris-fondo: #f4f4f8;
    --gris-borde: #e0e0ea;
    --texto: #1a1a2e;
    --texto-secundario: #6b6b83;
    --blanco: #ffffff;
    --rojo: #e63946;
    --verde: #2a9d8f;
    --amarillo: #f4a261;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    margin: 0; 
    font-family: 'Barlow', sans-serif; 
    background-color: var(--gris-fondo); 
    color: var(--texto);
    padding-bottom: 80px;
    line-height: 1.4;
  }

  .portada-container { width: 100%; height: 200px; overflow: hidden; position: relative; }
  .portada-container img { width: 100%; height: 100%; object-fit: cover; }
  .portada-overlay { 
    position: absolute; bottom: 0; left: 0; right: 0; 
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 20px; color: white;
  }
  .portada-overlay h1 { margin: 0; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

  header { background: var(--azul); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .stats-header { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; }

  .tabs { display: flex; background: var(--blanco); padding: 5px; margin: 15px; border-radius: 12px; border: 1px solid var(--gris-borde); }
  .tab { flex: 1; padding: 12px; text-align: center; font-weight: 700; font-size: 14px; border-radius: 8px; color: var(--texto-secundario); cursor: pointer; transition: 0.2s; text-transform: uppercase; }
  .tab.active { background: var(--azul); color: var(--blanco); }

  .section { display: none; padding: 0 15px; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .card { background: var(--blanco); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--gris-borde); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
  .card-title { font-weight: 800; font-size: 16px; margin-bottom: 15px; color: var(--azul); text-transform: uppercase; border-bottom: 2px solid var(--gris-fondo); padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }

  label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 13px; color: var(--texto-secundario); text-transform: uppercase; }
  select, input, textarea { 
    width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid var(--gris-fondo); border-radius: 10px; 
    font-size: 16px; font-family: 'Barlow', sans-serif; transition: 0.2s; background: #fcfcfd;
  }
  select:focus, input:focus { border-color: var(--azul); outline: none; background: white; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  button { 
    width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; 
    cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-primary { background: var(--azul); color: var(--blanco); }
  .btn-primary:active { transform: scale(0.98); background: var(--azul-oscuro); }
  .btn-outline { background: var(--blanco); color: var(--azul); border: 2px solid var(--azul); margin-top: 10px; }
  .btn-danger { background: #fee2e2; color: var(--rojo); margin-top: 20px; }

  .pueblo-item { 
    padding: 15px; border-bottom: 1px solid var(--gris-fondo); display: flex; justify-content: space-between; align-items: center;
  }
  .pueblo-item:last-child { border-bottom: none; }
  .pueblo-info h4 { margin: 0; font-size: 17px; font-weight: 700; }
  .pueblo-info p { margin: 4px 0 0; font-size: 13px; color: var(--texto-secundario); font-weight: 600; }

  .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; }
  .status-done { background: var(--verde); box-shadow: 0 0 8px rgba(42,157,143,0.4); }

  .historial-item { font-size: 14px; padding: 12px; border-bottom: 1px solid var(--gris-fondo); }
  .historial-item:last-child { border-bottom: none; }
  .historial-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 700; }
  .historial-meta { font-size: 12px; color: var(--texto-secundario); font-weight: 600; }

  #toast { 
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); 
    background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 30px; 
    font-size: 14px; font-weight: 700; display: none; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  .floating-total {
    position: fixed; bottom: 20px; right: 20px; background: var(--verde); color: white;
    padding: 15px 25px; border-radius: 50px; font-weight: 800; font-family: 'Barlow Condensed';
    font-size: 20px; box-shadow: 0 8px 15px rgba(42,157,143,0.3); z-index: 90;
  }
</style>
</head>
<body>

<div class="portada-container">
  <img src="portada.jpg" alt="Ruta Envases">
  <div class="portada-overlay">
    <h1>Ruta Envases</h1>
  </div>
</div>

<header>
  <div class="stats-header" id="header-stats">CARGANDO...</div>
  <div style="font-size: 20px;">🚛</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('hoy')">Hoy</div>
  <div class="tab" onclick="switchTab('registro')">Nueva</div>
  <div class="tab" onclick="switchTab('descarga')">Descarga</div>
  <div class="tab" onclick="switchTab('datos')">Datos</div>
</div>

<div id="section-hoy" class="section active">
  <div class="card">
    <div class="card-title">📍 Ruta del <span id="nombre-dia" style="margin-left:5px"></span></div>
    <div id="lista-pueblos-hoy"></div>
  </div>
</div>

<div id="section-registro" class="section">
  <div class="card">
    <div class="card-title">📝 Anotar Recogida</div>
    <label>Pueblo</label>
    <select id="reg-pueblo"></select>
    
    <label>Sector</label>
    <select id="reg-sector">
      <option value="Núcleo">Núcleo</option>
      <option value="Extrarradio">Extrarradio</option>
      <option value="Urbanizaciones">Urbanizaciones</option>
      <option value="Polígono">Polígono</option>
    </select>
    
    <div class="grid-2">
      <div>
        <label>Contenedores</label>
        <input type="number" id="reg-cantidad" value="1" min="1">
      </div>
      <div>
        <label>Nivel Llenado</label>
        <select id="reg-nivel">
          <option value="25%">25%</option>
          <option value="50%">50%</option>
          <option value="75%">75%</option>
          <option value="100%">100%</option>
          <option value="Exceso">Exceso (+100%)</option>
        </select>
      </div>
    </div>
    
    <label>Incidencias / Notas</label>
    <textarea id="reg-incidencia" placeholder="Ej: Contenedor roto, acceso bloqueado..."></textarea>
    
    <button class="btn-primary" onclick="guardarRecogida()">✅ Guardar Recogida</button>
  </div>
</div>

<div id="section-descarga" class="section">
  <div class="card">
    <div class="card-title">⚖️ Registro de Descarga</div>
    <label>Kilos Totales</label>
    <input type="number" id="des-kilos" placeholder="Ej: 1240">
    <label>Notas de Descarga</label>
    <textarea id="des-notas" placeholder="Ej: Planta de Huesca..."></textarea>
    <button class="btn-primary" onclick="guardarDescarga()">🚛 Registrar Descarga</button>
  </div>
  <div class="card">
    <div class="card-title">📜 Últimas Descargas</div>
    <div id="lista-descargas"></div>
  </div>
</div>

<div id="section-datos" class="section">
  <div class="card">
    <div class="card-title">📊 Gestión de Datos</div>
    <button class="btn-primary" onclick="exportarCSV()">📤 Compartir Reporte Recogidas (CSV)</button>
    <button class="btn-outline" onclick="exportarDescargasCSV()">📤 Compartir Reporte Descargas (CSV)</button>
    
    <button class="btn-danger" onclick="borrarTodo()">⚠️ Borrar Todo el Historial</button>
  </div>
  
  <div class="card">
    <div class="card-title">🕒 Historial Reciente</div>
    <div id="historial-recogidas"></div>
  </div>
</div>

<div id="toast"></div>
<div class="floating-total" id="float-kg">0 KG</div>

<script>
const CONFIG_RUTA = {
  "Lunes": [
    {p:"Bisaurri", s:"Núcleo"}, {p:"Arasán", s:"Núcleo"}, {p:"Urmella", s:"Núcleo"},
    {p:"Castejón de Sos", s:"Núcleo"}, {p:"Castejón de Sos", s:"Extrarradio"},
    {p:"Ramastué", s:"Núcleo"}, {p:"Eriste", s:"Núcleo"}, {p:"Eriste", s:"Camping"}
  ],
  "Martes": [
    {p:"Benasque", s:"Núcleo"}, {p:"Benasque", s:"Aparcamientos"}, {p:"Anciles", s:"Núcleo"},
    {p:"Cerler", s:"Núcleo"}, {p:"Cerler", s:"Urbanizaciones"}, {p:"Pla de Estany", s:"Núcleo"}
  ],
  "Miércoles": [
    {p:"Sahún", s:"Núcleo"}, {p:"Eriste", s:"Núcleo"}, {p:"Chia", s:"Núcleo"},
    {p:"Castejón de Sos", s:"Núcleo"}, {p:"Sesué", s:"Núcleo"}, {p:"Villanova", s:"Núcleo"}
  ],
  "Jueves": [
    {p:"Seira", s:"Núcleo"}, {p:"Chía", s:"Núcleo"}, {p:"Villanova", s:"Núcleo"},
    {p:"Sesué", s:"Núcleo"}, {p:"Eriste", s:"Núcleo"}, {p:"Sahún", s:"Núcleo"}
  ],
  "Viernes": [
    {p:"Benasque", s:"Núcleo"}, {p:"Benasque", s:"Polígono"}, {p:"Anciles", s:"Núcleo"},
    {p:"Cerler", s:"Núcleo"}, {p:"Castejón de Sos", s:"Núcleo"}, {p:"Sesué", s:"Camping"}
  ],
  "Sábado": [
    {p:"Benasque", s:"Núcleo"}, {p:"Eriste", s:"Núcleo"}, {p:"Castejón de Sos", s:"Núcleo"}
  ],
  "Domingo": []
};

let diaActual = "";

function init() {
  const fecha = new Date();
  const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
  diaActual = dias[fecha.getDay()];
  document.getElementById('nombre-dia').textContent = diaActual;
  
  cargarPueblosHoy();
  cargarSelectPueblos();
  actualizarStats();
  renderHistorial();
  renderDescargas();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('section-' + tab).classList.add('active');
}

function cargarPueblosHoy() {
  const lista = document.getElementById('lista-pueblos-hoy');
  const pueblos = CONFIG_RUTA[diaActual] || [];
  const recogidas = obtenerRecogidas().filter(r => isHoy(r.fecha));
  
  if(pueblos.length === 0) {
    lista.innerHTML = '<p style="text-align:center; padding:20px; color:var(--texto-secundario);">No hay ruta programada para hoy.</p>';
    return;
  }

  lista.innerHTML = pueblos.map(item => {
    const hecho = recogidas.some(r => r.pueblo === item.p);
    return `
      <div class="pueblo-item">
        <div class="pueblo-info">
          <h4>${item.p}</h4>
          <p>${item.s}</p>
        </div>
        <div class="status-dot ${hecho ? 'status-done' : ''}"></div>
      </div>
    `;
  }).join('');
}

function cargarSelectPueblos() {
  const select = document.getElementById('reg-pueblo');
  const todosLosPueblos = [...new Set(Object.values(CONFIG_RUTA).flat().map(i => i.p))].sort();
  select.innerHTML = todosLosPueblos.map(p => `<option value="${p}">${p}</option>`).join('');
}

function guardarRecogida() {
  const r = {
    fecha: new Date().toISOString(),
    dia: diaActual,
    pueblo: document.getElementById('reg-pueblo').value,
    sector: document.getElementById('reg-sector').value,
    contenedores: parseInt(document.getElementById('reg-cantidad').value),
    nivel: document.getElementById('reg-nivel').value,
    incidencia: document.getElementById('reg-incidencia').value
  };

  const historial = obtenerRecogidas();
  historial.unshift(r);
  localStorage.setItem('historial_recogidas', JSON.stringify(historial));
  
  mostrarToast("✅ Recogida guardada");
  document.getElementById('reg-incidencia').value = "";
  
  actualizarStats();
  cargarPueblosHoy();
  renderHistorial();
  switchTab('hoy');
}

function guardarDescarga() {
  const kilos = parseInt(document.getElementById('des-kilos').value);
  if(!kilos) { mostrarToast("❌ Introduce los kilos"); return; }
  
  const d = {
    fecha: new Date().toISOString(),
    kilos: kilos,
    notas: document.getElementById('des-notas').value
  };

  const descargas = obtenerDescargas();
  descargas.unshift(d);
  localStorage.setItem('historial_descargas', JSON.stringify(descargas));
  
  document.getElementById('des-kilos').value = "";
  document.getElementById('des-notas').value = "";
  mostrarToast("🚛 Descarga registrada");
  
  actualizarStats();
  renderDescargas();
}

function obtenerRecogidas() { return JSON.parse(localStorage.getItem('historial_recogidas') || '[]'); }
function obtenerDescargas() { return JSON.parse(localStorage.getItem('historial_descargas') || '[]'); }

function isHoy(fechaIso) {
  const hoy = new Date().toDateString();
  return new Date(fechaIso).toDateString() === hoy;
}

function actualizarStats() {
  const recogidasHoy = obtenerRecogidas().filter(r => isHoy(r.fecha));
  const totalContHoy = recogidasHoy.reduce((acc, r) => acc + r.contenedores, 0);
  const totalKgHoy = obtenerDescargas().filter(d => isHoy(d.fecha)).reduce((acc, d) => acc + d.kilos, 0);
  
  document.getElementById('header-stats').textContent = `${recogidasHoy.length} PARADAS | ${totalContHoy} CONT.`;
  document.getElementById('float-kg').textContent = `${totalKgHoy} KG`;
}

function renderHistorial() {
  const h = obtenerRecogidas().slice(0,10);
  const lista = document.getElementById('historial-recogidas');
  lista.innerHTML = h.map(r => `
    <div class="historial-item">
      <div class="historial-header">
        <span>${r.pueblo} (${r.sector})</span>
        <span style="color:var(--verde)">${r.contenedores} und.</span>
      </div>
      <div class="historial-meta">${new Date(r.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - Llenado: ${r.nivel}</div>
    </div>
  `).join('');
}

function renderDescargas() {
  const d = obtenerDescargas().slice(0,5);
  const lista = document.getElementById('lista-descargas');
  lista.innerHTML = d.map(item => `
    <div class="historial-item">
      <div class="historial-header">
        <span>${new Date(item.fecha).toLocaleDateString()}</span>
        <span style="color:var(--azul)">${item.kilos} KG</span>
      </div>
      <div class="historial-meta">${item.notas || 'Sin notas'}</div>
    </div>
  `).join('');
}

function mostrarToast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

function borrarTodo() {
  if(confirm("¿Estás seguro de borrar todo el historial? Esto no se puede deshacer.")) {
    localStorage.clear();
    location.reload();
  }
}

// --- FUNCIONES DE EXPORTACIÓN MEJORADAS (WEB SHARE API) ---

async function descargarArchivo(contenido, nombre) {
  const blob = new Blob([contenido], {type:'text/csv;charset=utf-8;'});
  const archivo = new File([blob], nombre, { type: 'text/csv' });

  // Si el móvil permite compartir archivos (Android/iOS modernos)
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [archivo] })) {
    try {
      await navigator.share({
        files: [archivo],
        title: 'Reporte de Ruta',
        text: 'Envío el archivo CSV con los datos.'
      });
      mostrarToast('✅ Compartido correctamente');
    } catch (err) {
      // Si el usuario cancela o hay error, intentamos descarga normal
      ejecutarDescargaTradicional(blob, nombre);
    }
  } else {
    // Si el navegador no soporta compartir (PC o navegadores antiguos)
    ejecutarDescargaTradicional(blob, nombre);
  }
}

function ejecutarDescargaTradicional(blob, nombre) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = nombre;
  a.click();
  URL.revokeObjectURL(url);
  mostrarToast('📥 Archivo descargado');
}

function exportarCSV() {
  const registros = obtenerRecogidas();
  if (!registros.length) { mostrarToast('No hay datos para exportar'); return; }
  const cab = 'Fecha,Pueblo,Sector,Dia,Contenedores,Nivel,Incidencias\n';
  const filas = registros.map(r => {
    const f = new Date(r.fecha).toLocaleString('es-ES');
    return `"${f}","${r.pueblo}","${r.sector}","${r.dia}",${r.contenedores},"${r.nivel}","${(r.incidencias||'').replace(/,/g,';')}"`;
  }).join('\n');
  descargarArchivo(cab+filas, `recogidas-${new Date().toISOString().slice(0,10)}.csv`);
}

function exportarDescargasCSV() {
  const descargas = obtenerDescargas();
  if (!descargas.length) { mostrarToast('No hay descargas para exportar'); return; }
  const cab = 'Fecha,Kilos,Notas\n';
  const filas = descargas.map(d => {
    const f = new Date(d.fecha).toLocaleString('es-ES');
    return `"${f}",${d.kilos},"${(d.notas||'').replace(/,/g,';')}"`;
  }).join('\n');
  descargarArchivo(cab+filas, `descargas-${new Date().toISOString().slice(0,10)}.csv`);
}

window.onload = init;
</script>
</body>
</html>
